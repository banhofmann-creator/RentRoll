services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rentroll}
      POSTGRES_USER: ${POSTGRES_USER:-rentroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentroll}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rentroll}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rentroll}
      - POSTGRES_USER=${POSTGRES_USER:-rentroll}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rentroll}
      - UPLOAD_DIR=/app/uploads
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
  uploads:
  exports:
